spring:
  application:
    name: multi-tenant-saas
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/saas_db}
    username: ${DB_USERNAME:saas_user}
    password: ${DB_PASSWORD:saas123}

    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        multiTenancy: SCHEMA
        tenant_identifier_resolver: com.saas.config.TenantIdentifierResolver
        multi_tenant_connection_provider: com.saas.config.TenantConnectionProvider

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-minimum-32-characters}
  expiration: 86400000 # 24 hours in milliseconds

# Application Configuration
app:
  default-tenant-schema: master
  tenant-header: X-TENANT-ID

logging:
  level:
    root: INFO
    com.saas: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

